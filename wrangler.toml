name = "lunar-gateway"
main = "src/lib.rs"
compatibility_date = "2026-06-08"

[[r2_buckets]]
binding = "LUNAR_BUCKET"
bucket_name = "lunar-ast-organization"

[vars]
LUNAR_CLOCK_SKEW_SECONDS = "30"
LUNAR_KEY_CACHE_TTL_SECONDS = "300"
LUNAR_GATEWAY_BUFFER_LIMIT_BYTES = "2097152"

# Multi-project public key mapping (JSON format, camelCase)
# Generated by `lunar keygen` for each project
LUNAR_PUBLIC_KEYS = "{}"
